        folderPath: ../dotclaude_todo_list/skills/create-task
      - name: delete-task
        folderPath: ../dotclaude_todo_list/skills/delete-task
      - name: list-tasks
        folderPath: ../dotclaude_todo_list/skills/list-tasks
