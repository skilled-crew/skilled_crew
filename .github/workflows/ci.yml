name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/_skillet_agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/_skillet_agent/package-lock.json
      - run: npm ci
      - run: npm run schema:check
      - run: npm run typecheck
      - run: npm run build

  docsite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install agent dependencies (typedoc reads agent source)
        working-directory: packages/_skillet_agent
        run: npm ci
      - name: Build docs
        working-directory: packages/_skillet_docsite
        run: npm ci && npm run build
